name: Build and Push

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - run: npm ci
      - run: npm test

  build:
    needs: test
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          file: Containerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - run: |
          mkdir -p /tmp/digests
          PLATFORM="${{ matrix.platform }}"
          echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${PLATFORM//\//-}.txt"

      - uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.runner }}
          path: /tmp/digests/

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: digest-*
          merge-multiple: true
          path: /tmp/digests

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          DIGESTS=$(cat /tmp/digests/*.txt)
          SOURCES=""
          for D in $DIGESTS; do
            SOURCES="$SOURCES ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@$D"
          done
          docker buildx imagetools create -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest $SOURCES

      - name: Delete orphaned versions
        uses: actions/github-script@v8
        with:
          script: |
            const pkg = 'ksae-notice';
            const image = 'luftaquila/ksae-notice';

            // Get referenced digests from current manifest list
            const tokenRes = await fetch(
              `https://ghcr.io/token?service=ghcr.io&scope=repository:${image}:pull`
            );
            const { token } = await tokenRes.json();
            const manifestRes = await fetch(
              `https://ghcr.io/v2/${image}/manifests/latest`,
              {
                headers: {
                  Authorization: `Bearer ${token}`,
                  Accept: 'application/vnd.docker.distribution.manifest.list.v2+json,application/vnd.oci.image.index.v1+json'
                }
              }
            );
            const manifest = await manifestRes.json();
            const referenced = new Set(manifest.manifests.map(m => m.digest));

            // Delete untagged versions not referenced by manifest list
            const versions = await github.paginate(
              github.rest.packages.getAllPackageVersionsForPackageOwnedByAuthenticatedUser,
              { package_type: 'container', package_name: pkg }
            );
            for (const v of versions) {
              if (v.metadata.container.tags.length === 0 && !referenced.has(v.name)) {
                console.log(`Deleting orphaned: ${v.id} (${v.name})`);
                await github.rest.packages.deletePackageVersionForAuthenticatedUser({
                  package_type: 'container',
                  package_name: pkg,
                  package_version_id: v.id
                });
              }
            }
